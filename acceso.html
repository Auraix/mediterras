<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Acceso operarios · Mediterras</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh}
body{
  font-family:'Outfit',sans-serif;background:#1A2920;color:#fff;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
}
.wrap{width:100%;max-width:380px}
.logo{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;text-align:center;color:#fff;letter-spacing:.02em;margin-bottom:.2rem}
.logo span{font-style:italic;font-weight:300;color:#C8A96E}
.sub{text-align:center;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:2.2rem}
.card{background:#243329;border:1px solid rgba(200,169,110,.25);border-radius:6px;padding:2rem 1.75rem}
.field-lbl{font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;color:#C8A96E;font-weight:500;margin-bottom:.4rem;display:block}
.field-group{margin-bottom:1.2rem}
input{
  width:100%;background:#1A2920;border:1px solid rgba(200,169,110,.25);color:#fff;
  font-family:'Outfit',sans-serif;font-size:.95rem;padding:.75rem .9rem;border-radius:4px;outline:none;
  transition:border-color .2s;
}
input:focus{border-color:#C8A96E}
input::placeholder{color:rgba(255,255,255,.3)}
.btn{
  width:100%;background:#C8A96E;color:#1A2920;border:none;border-radius:4px;padding:.85rem;
  font-family:'Outfit',sans-serif;font-weight:600;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;transition:background .2s;margin-top:.4rem;
}
.btn:hover{background:#E8C98E}
.btn:disabled{opacity:.5;cursor:default}
.error{color:#E88;font-size:.78rem;margin-top:.8rem;text-align:center;display:none}
.back{display:block;text-align:center;margin-top:1.6rem;font-size:.72rem;color:rgba(255,255,255,.4);text-decoration:none;letter-spacing:.04em}
.back:hover{color:#C8A96E}
.spinner{display:inline-block;width:14px;height:14px;border-radius:50%;border:2px solid rgba(26,41,32,.3);border-top-color:#1A2920;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">MEDITERRAS<span>.</span></div>
  <div class="sub">Acceso operarios · Área privada</div>
  <div class="card">
    <div class="field-group">
      <label class="field-lbl">Usuario</label>
      <input type="text" id="usuario" placeholder="Tu nombre" autocomplete="username">
    </div>
    <div class="field-group">
      <label class="field-lbl">Contraseña</label>
      <input type="password" id="pin" inputmode="numeric" maxlength="4" placeholder="····" autocomplete="current-password">
    </div>
    <button class="btn" id="btn-entrar" onclick="entrar()">Entrar</button>
    <div class="error" id="error"></div>
  </div>
  <a href="/" class="back">← Volver a mediterras.es</a>
</div>

<script>
const WH_LOGIN = 'https://aientik.app.n8n.cloud/webhook/construccion-login';

document.getElementById('pin').addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });
document.getElementById('usuario').addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });

async function entrar() {
  const usuario = document.getElementById('usuario').value.trim();
  const pin = document.getElementById('pin').value.trim();
  const err = document.getElementById('error');
  const btn = document.getElementById('btn-entrar');
  err.style.display = 'none';

  if (!usuario || !pin) {
    err.textContent = 'Rellena usuario y contraseña.';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Comprobando...';

  let resultado;
  try {
    resultado = await fetch(WH_LOGIN, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ nombre: usuario, pin })
    }).then(r => r.json());
  } catch (e) {
    resultado = { ok: false, mensaje: 'No se pudo conectar. Revisa tu conexión.' };
  }

  if (resultado.ok) {
    sessionStorage.setItem('auraix_nombre', resultado.nombre || usuario);
    sessionStorage.setItem('auraix_oficio', resultado.oficio || '');
    window.location.href = '/app/';
    return;
  }

  btn.disabled = false;
  btn.innerHTML = 'Entrar';
  err.textContent = resultado.mensaje || 'Usuario o contraseña incorrectos.';
  err.style.display = 'block';
}
</script>
</body>
</html>
