<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2C3E35; --primary-dark:#1A2920; --accent:#C8A96E;
  --bg-main:#F5F0E8; --bg-alt:#FFFFFF; --bg-card:#FFFFFF;

  --font-display:'Cormorant Garamond',serif; --font-body:'Outfit',sans-serif;
  --radius:2px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg-main);color:var(--text-main);overflow-x:hidden}

/* ── NAV ── */
nav{position:fixed;top:0;width:100%;z-index:100;padding:1rem 5vw;display:flex;align-items:center;justify-content:space-between;background:rgba(26,41,32,.97);backdrop-filter:blur(14px);border-bottom:1px solid rgba(200,169,110,.25);transition:box-shadow .3s}
nav.scrolled{box-shadow:0 2px 20px rgba(0,0,0,.3)}
.nav-logo{font-family:var(--font-display);font-size:1.45rem;font-weight:700;color:#FFFFFF;text-decoration:none;letter-spacing:.04em}
.nav-logo span{font-style:italic;font-weight:300;color:var(--text-main)}
.nav-right{display:flex;align-items:center;gap:1.5rem}
nav ul{list-style:none;display:flex;gap:2rem;align-items:center}
nav a{color:rgba(255,255,255,.75);text-decoration:none;font-size:.75rem;font-weight:400;letter-spacing:.1em;text-transform:uppercase;transition:color .2s}
nav a:hover{color:#C8A96E}
.nav-phone{font-size:.82rem!important;color:rgba(255,255,255,.9)!important;font-weight:500!important;letter-spacing:.02em!important;text-transform:none!important}
.nav-cta{background:var(--primary)!important;color:#ffffff!important;padding:.5rem 1.3rem;border-radius:var(--radius);font-weight:500!important;letter-spacing:.06em!important;font-size:.74rem!important;transition:background .2s!important}
.nav-cta:hover{background:var(--accent)!important}

/* LANG SWITCHER */
.lang-switcher{display:flex;align-items:center;gap:.35rem;margin-left:.5rem}
.lang-btn{display:flex;align-items:center;gap:.3rem;background:none;border:1px solid rgba(200,169,110,.25);color:rgba(255,255,255,.45);font-family:var(--font-body);font-size:.65rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .55rem;cursor:pointer;border-radius:var(--radius);transition:all .2s;line-height:1}
.lang-btn:hover,.lang-btn.active{border-color:var(--primary);color:var(--accent)}
.lang-btn .flag{font-size:.85rem;line-height:1}

/* STAFF ACCESS ICON */
.staff-access{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;border:1px solid rgba(200,169,110,.35);color:rgba(255,255,255,.55);text-decoration:none;margin-left:.5rem;transition:all .2s;flex-shrink:0}
.staff-access:hover{border-color:var(--accent);color:var(--accent);background:rgba(200,169,110,.1)}
.staff-access svg{width:16px;height:16px}

/* ── HERO ── */
#hero{min-height:92vh;position:relative;display:flex;align-items:center;overflow:hidden;background:#F5F0E8}
.hero-photo{position:absolute;top:0;right:0;width:52%;height:100%;background-size:cover;background-position:center;clip-path:polygon(8% 0,100% 0,100% 100%,0% 100%)}
.hero-overlay{position:absolute;top:0;right:0;width:52%;height:100%;background:linear-gradient(to right,#F5F0E8 0%,transparent 20%);z-index:1;pointer-events:none}
#top-bar{position:fixed;top:0;left:0;right:0;height:2px;z-index:200}
.hero-content{position:relative;z-index:2;padding:7rem 5vw 5rem;display:grid;grid-template-columns:55% 45%;gap:2rem;align-items:center;width:100%}
.hero-pill{display:inline-flex;align-items:center;gap:.5rem;background:rgba(44,62,53,.08);border:1px solid rgba(44,62,53,.2);padding:.35rem 1rem;border-radius:999px;margin-bottom:1.6rem}
.hero-pill::before{content:'';width:6px;height:6px;background:#C8A96E;border-radius:50%;animation:blink 2s infinite}
.hero-pill span{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:#2C3E35;font-weight:500}
h1{font-family:var(--font-display);font-size:clamp(3.2rem,6vw,5.8rem);font-weight:300;line-height:1;color:#2C3E35;margin-bottom:1.2rem;letter-spacing:-.01em}
h1 em{font-style:italic;font-weight:600;color:#C8A96E;display:block}
.hero-sub{font-size:.95rem;font-weight:400;color:#4A5E52;line-height:1.85;margin-bottom:2rem;max-width:460px}
.hero-actions{display:flex;gap:1rem;flex-wrap:wrap}
.btn-primary{display:inline-block;background:var(--primary);color:#ffffff;text-decoration:none;padding:.9rem 2.2rem;border-radius:var(--radius);font-weight:500;font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;transition:background .2s,transform .15s}
.btn-primary:hover{background:var(--accent);transform:translateY(-1px)}
.btn-ghost{display:inline-flex;align-items:center;gap:.5rem;color:#2C3E35;text-decoration:none;font-size:.82rem;border-bottom:1px solid rgba(44,62,53,.4);padding-bottom:2px;letter-spacing:.06em;transition:all .2s}
.btn-ghost:hover{color:#C8A96E;border-color:#C8A96E}
.hero-right{display:flex;flex-direction:column;gap:1rem}
.hero-trust{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.trust-item{background:rgba(245,240,232,.95);border:1px solid rgba(44,62,53,.15);padding:.8rem 1rem;border-radius:var(--radius);display:flex;align-items:center;gap:.6rem;font-size:.75rem;color:#2C3E35;font-weight:400}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(44,62,53,.1)}
.hero-stat{background:rgba(245,240,232,.95);padding:1rem;text-align:center}
.hs-num{font-family:var(--font-display);font-size:1.8rem;font-weight:600;color:#2C3E35;line-height:1;display:block;margin-bottom:.15rem}
.hs-label{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#7A8A70}

/* ── SHARED ── */
.section-tag{display:block;font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:#C8A96E;font-weight:500;margin-bottom:.7rem}
h2{font-family:var(--font-display);font-size:clamp(2rem,4vw,3.2rem);font-weight:400;line-height:1.1;margin-bottom:.8rem;letter-spacing:-.01em;color:#2C3E35}
h2 em{font-style:italic;color:#C8A96E}
.section-intro{font-size:.9rem;line-height:1.9;max-width:520px;font-weight:300;color:#4A5E52}
.gold-rule{width:40px;height:1px;background:#C8A96E;margin:1.2rem 0 2rem;opacity:.8}
#projects .section-intro{color:#4A5E52}
#services .section-intro{color:#4A5E52}
.section-light{background:var(--bg-light);color:#3D3D3A}
.section-light h2{color:#2C3E35}
.section-light h2 em{color:#C8A96E}
.section-light .section-tag{color:#C8A96E}
.section-light .section-intro{color:#5A5A56}

/* ── PROJECTS ── */
#projects{padding:6rem 5vw;background:#F5F0E8}
.projects-header{margin-bottom:3.5rem}
.projects-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:3px;background:var(--border)}
.project-card{position:relative;overflow:hidden;cursor:pointer;background:var(--bg-card)}
.project-card:first-child{grid-column:1/3;grid-row:1/2}
.project-card:nth-child(4){grid-column:2/4}
.project-photo{width:100%;height:100%;min-height:280px;object-fit:cover;display:block;transition:transform .6s;filter:brightness(.85) saturate(1.1)}
.project-card:hover .project-photo{transform:scale(1.04)}
.project-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(20,30,22,.88) 0%,transparent 55%);opacity:0;transition:opacity .3s}
.project-card:hover .project-overlay{opacity:1}
.project-info{position:absolute;bottom:0;left:0;right:0;padding:1.5rem;transform:translateY(10px);opacity:0;transition:all .3s}
.project-card:hover .project-info{transform:translateY(0);opacity:1}
.project-type{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:#C8A96E;font-weight:500;margin-bottom:.3rem}
.project-name{font-family:var(--font-display);font-size:1.3rem;font-weight:600;color:#fff;line-height:1.1;margin-bottom:.5rem}
.project-meta{display:flex;gap:1rem}
.project-meta span{font-size:.68rem;color:rgba(255,255,255,.9);font-weight:300;letter-spacing:.06em}

/* ── SERVICES ── */
#services{padding:6rem 5vw;background:#FFFFFF}
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1px;background:var(--border);margin-top:3.5rem}
.service-card{background:#F5F0E8;padding:2.5rem;transition:background .2s;position:relative;overflow:hidden;border:1px solid rgba(44,62,53,.08)}
.service-card::before{content:'';position:absolute;top:0;left:0;width:2px;height:0;background:linear-gradient(to bottom,#C8A96E,#E8C98E);transition:height .4s}
.service-card:hover{background:#EAE4D6}
.service-card:hover::before{height:100%}
.service-icon{font-size:1.8rem;margin-bottom:1.2rem;display:block}
.service-name{font-family:var(--font-display);font-size:1.3rem;font-weight:600;color:#2C3E35;margin-bottom:.7rem;line-height:1.1}
.service-desc{font-size:.82rem;color:#4A5E52;line-height:1.7;margin-bottom:1.2rem;font-weight:300}
.service-items{list-style:none;display:flex;flex-direction:column;gap:.35rem}
.service-items li{font-size:.75rem;color:#5A6E5E;font-weight:300;padding-left:1rem;position:relative}
.service-items li::before{content:'';position:absolute;left:0;color:var(--primary);font-size:.65rem}

/* ── PROCESS ── */
#process{padding:6rem 5vw;background:#F5F0E8}
.process-inner{display:grid;grid-template-columns:1fr 2fr;gap:5rem;align-items:start}
.process-steps{display:flex;flex-direction:column;gap:0;margin-top:1rem}
.process-step{display:flex;gap:1.5rem;padding:1.8rem 0;border-bottom:.5px solid rgba(44,62,53,.12)}
.process-step:last-child{border-bottom:none}
.step-num{font-family:var(--font-display);font-size:2.5rem;font-weight:700;color:rgba(44,62,53,.2);line-height:1;flex-shrink:0;width:3.5rem;transition:color .3s}
.process-step:hover .step-num{color:#C8A96E}
.step-title{font-family:var(--font-display);font-size:1.1rem;font-weight:600;color:#2C3E35;margin-bottom:.4rem}
.step-text{font-size:.8rem;color:#4A5E52;line-height:1.7;font-weight:300}

/* ── FEATURE ── */
#feature{position:relative;min-height:520px;display:flex;align-items:center;overflow:hidden}
.feature-photo{position:absolute;inset:0;background-size:cover;background-position:center}
.feature-overlay{position:absolute;inset:0;background:linear-gradient(105deg,rgba(20,30,22,.92) 0%,rgba(20,30,22,.6) 50%,rgba(20,30,22,.15) 100%)}
.feature-content{position:relative;z-index:2;padding:5rem 8vw;max-width:580px}
.feature-content .section-tag{color:var(--accent)}
.feature-content h2{color:#fff;font-size:clamp(2rem,4vw,3rem)}
.feature-content h2 em{color:var(--accent)}
.feature-content p{color:rgba(255,255,255,.9);font-size:.88rem;line-height:1.9;margin:1.5rem 0 2.5rem;font-weight:300}
.feature-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:rgba(200,169,110,.15);max-width:360px}
.fs{padding:1.1rem 1.3rem;background:rgba(255,255,255,.1);text-align:center}
.fs-num{font-family:var(--font-display);font-size:1.8rem;font-weight:700;color:var(--accent);display:block;line-height:1;margin-bottom:.2rem}
.fs-label{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.8)}

/* ── REVIEWS ── */
#reviews{padding:6rem 5vw;background:#FFFFFF}
.reviews-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:3.5rem;flex-wrap:wrap;gap:1rem}
.rating-block{text-align:right}
.rating-num{font-family:var(--font-display);font-size:3.5rem;font-weight:600;color:#2C3E35;line-height:1}
.rating-stars{color:var(--accent);font-size:.9rem;margin:.2rem 0}
.rating-note{font-size:.7rem;color:#5A6E5E;font-weight:300}
.reviews-scroll{overflow:hidden}
.reviews-track{display:flex;gap:1.5rem;animation:scrollLeft 55s linear infinite;width:max-content}
.reviews-track:hover{animation-play-state:paused}
.review-card{background:#F5F0E8;border:1px solid rgba(44,62,53,.1);padding:2rem;width:360px;flex-shrink:0;border-radius:var(--radius)}
.review-stars-row{color:var(--accent);font-size:.72rem;margin-bottom:.8rem}
.review-text{font-size:.85rem;line-height:1.8;color:#2C3E35;margin-bottom:1rem;font-weight:300;font-style:italic}
.review-project{font-size:.65rem;color:#C8A96E;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.4rem}
.review-author{font-size:.7rem;color:rgba(255,255,255,.65);font-weight:400}

/* ── FAQ ── */
#faq{padding:6rem 5vw;background:#F5F0E8}
.faq-inner{display:grid;grid-template-columns:1fr 1.5fr;gap:5rem;align-items:start}
.faq-list{display:flex;flex-direction:column}
.faq-item{border-bottom:.5px solid rgba(44,62,53,.15)}
.faq-q{padding:1.3rem 0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:.88rem;font-weight:400;color:#2C3E35;transition:color .2s;gap:1rem;line-height:1.4}
.faq-q:hover{color:#C8A96E}
.faq-arrow{font-size:.65rem;color:#C8A96E;transition:transform .25s;flex-shrink:0}
.faq-a{font-size:.8rem;color:#4A5E52;line-height:1.8;font-weight:300;padding-bottom:1.2rem;display:none}
.faq-item.open .faq-arrow{transform:rotate(180deg)}
.faq-item.open .faq-a{display:block}
.faq-item.open .faq-q{color:#C8A96E}

/* ── BUDGET ── */
#budget{padding:6rem 5vw;background:var(--bg-light);text-align:center}
#budget .section-tag{color:#C8A96E}
#budget h2{color:#2C3E35}
#budget h2 em{color:#C8A96E}
#budget .section-intro{color:#5A5A56;margin:0 auto 3.5rem}
.budget-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem;max-width:900px;margin:0 auto 2rem}
.budget-card{background:#fff;border:.5px solid rgba(200,169,110,.3);padding:2.2rem 1.8rem;border-radius:4px;box-shadow:0 4px 20px rgba(27,58,107,.08);transition:box-shadow .25s,transform .25s;text-align:center}
.budget-card:hover{box-shadow:0 10px 40px rgba(200,169,110,.15);transform:translateY(-3px)}
.budget-icon{font-size:2rem;margin-bottom:.8rem;display:block}
.budget-card h3{font-family:var(--font-display);font-size:1.1rem;font-weight:600;color:#2C3E35;margin-bottom:.5rem}
.budget-card p{font-size:.78rem;color:#5A5A56;line-height:1.7;margin-bottom:1.5rem;font-weight:300}
.budget-btn{display:inline-block;background:var(--primary);color:#fff;text-decoration:none;padding:.55rem 1.3rem;font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;border-radius:var(--radius);transition:background .2s}
.budget-btn:hover{background:#1A2920}
.budget-hours{font-size:.75rem;color:#7A8A70;margin-top:.5rem}

/* ── INFO ── */
#info{padding:3rem 5vw;background:#2C3E35;border-top:1px solid rgba(200,169,110,.25)}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:2.5rem}
.info-block h3{font-family:var(--font-display);font-size:.95rem;font-weight:600;color:var(--accent);margin-bottom:.8rem}
.info-block p,.info-block li{font-size:.78rem;color:rgba(255,255,255,.6);line-height:2;font-weight:300}
.info-block ul{list-style:none}
.info-block a{color:rgba(255,255,255,.7);text-decoration:none;transition:color .2s}
.info-block a:hover{color:var(--primary)}

/* ── FOOTER ── */
footer{background:#2C3E35;border-top:1px solid rgba(200,169,110,.2);padding:1.8rem 5vw;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.footer-logo{font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:#FFFFFF;text-decoration:none}
.footer-logo span{font-style:italic;font-weight:300;color:rgba(255,255,255,.5)}
footer p{font-size:.68rem;color:rgba(255,255,255,.6);font-weight:300}

/* ── WHATSAPP ── */
#whatsapp-btn{position:fixed;bottom:1.8rem;right:1.8rem;z-index:999;width:56px;height:56px;display:flex;align-items:center;justify-content:center;border-radius:50%;box-shadow:0 4px 20px rgba(37,211,102,.45);text-decoration:none;transition:transform .2s,box-shadow .2s;animation:waPulse 2.5s ease infinite}
#whatsapp-btn:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(37,211,102,.65);animation:none}
#whatsapp-btn svg{width:56px;height:56px}
#whatsapp-tooltip{position:absolute;right:68px;background:#1A1A1A;color:#fff;font-size:.72rem;padding:.35rem .85rem;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transform:translateX(6px);transition:opacity .2s,transform .2s}
#whatsapp-tooltip::after{content:'';position:absolute;left:100%;top:50%;transform:translateY(-50%);border:5px solid transparent;border-left-color:#1A1A1A}
#whatsapp-btn:hover #whatsapp-tooltip{opacity:1;transform:translateX(0)}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes scrollLeft{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes waPulse{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.45)}50%{box-shadow:0 4px 30px rgba(37,211,102,.75),0 0 0 8px rgba(37,211,102,.1)}}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  #hero{background:#F5F0E8;flex-direction:column;min-height:auto}
  .hero-photo{width:100%;height:45vh;top:0;right:0;clip-path:none;position:relative;flex-shrink:0}
  .hero-overlay{width:100%;clip-path:none;background:linear-gradient(to bottom,transparent 60%,#F5F0E8 100%)}
  .hero-content{grid-template-columns:1fr;gap:2rem;padding:2rem 5vw 3rem;display:block}
  .hero-right{margin-top:2rem}
  .hero-trust{grid-template-columns:1fr}
  .hero-stats{grid-template-columns:repeat(3,1fr)}

  .project-card:first-child,.project-card:nth-child(4){grid-column:auto}

  .faq-inner{grid-template-columns:1fr}
  #feature .feature-overlay{background:rgba(20,30,22,.82)}
  .lang-switcher{gap:.25rem}
  .lang-btn{padding:.25rem .4rem}
  .staff-access{width:30px;height:30px;margin-left:.3rem}
}
@media(max-width:560px){
  .lang-btn span:not(.flag){display:none}
  .lang-btn .flag{font-size:1rem}
}
</style>

  let lang='es';

  function render(l){
    lang=l;
    const t=T[l];
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));

    /* NAV */
    set('nav-logo',`Mediterras`);
    const anchors=['#projects','#services','#process','#reviews'];
    set('nav-ul', t.nav.map((n,i)=>`<li><a href="${anchors[i]}">${n}</a></li>`).join('')
      +`<li><a href="tel:${B.phone.replace(/\s/g,'')}" class="nav-phone">${t.nav_phone}</a></li>`
      +`<li><a href="#budget" class="nav-cta">${t.nav_cta}</a></li>`);

    /* HERO */
    set('hero-badge',t.hero_badge,'text');
    set('hero-h1',t.hero_h1);
    set('hero-sub',t.hero_sub,'text');
    q('hero-cta1').textContent=t.hero_cta1;
    q('hero-cta2').querySelector('span').textContent=t.hero_cta2;
    set('hero-trust',t.trust.map(tx=>`<div class="trust-item">${tx}</div>`).join(''));
    set('hero-stats',[
      {num:B.stat1_num,label:B.stat1_label},
      {num:B.stat2_num,label:B.stat2_label},
      {num:B.stat3_num,label:B.stat3_label}
    ].map(s=>`<div class="hero-stat"><span class="hs-num">${s.num}</span><span class="hs-label">${s.label}</span></div>`).join(''));

    /* PROJECTS */
    set('projects-tag',t.projects_tag,'text');
    set('projects-h2',t.projects_h2);
    set('projects-intro',t.projects_intro,'text');
    if(q('projects-cta')) q('projects-cta').textContent=t.projects_cta;

    /* SERVICES */
    set('services-tag',t.services_tag,'text');
    set('services-h2',t.services_h2);
    set('services-intro',t.services_intro,'text');

    /* PROCESS */
    set('process-tag',t.process_tag,'text');
    set('process-h2',t.process_h2);
    set('process-intro',t.process_intro,'text');
    if(q('process-cta')) q('process-cta').textContent=t.process_cta;

    /* FEATURE */
    set('feature-tag',t.feature_tag,'text');
    set('feature-h2',t.feature_h2);
    set('feature-body',t.feature_body,'text');

    /* REVIEWS */
    set('reviews-tag',t.reviews_tag,'text');
    set('reviews-h2',t.reviews_h2);
    set('rating-note',t.rating_note,'text');

    /* FAQ */
    set('faq-tag',t.faq_tag,'text');
    set('faq-h2',t.faq_h2);
    set('faq-intro',t.faq_intro,'text');
    if(q('faq-cta')) q('faq-cta').textContent=t.faq_cta;
    const faqs=l==='es'?C.faqs:(faqsI18n[l]||C.faqs);
    set('faq-list',faqs.map((f,i)=>`
      <div class="faq-item" data-i="${i}">
        <div class="faq-q">${f.q}<span class="faq-arrow">▼</span></div>
        <div class="faq-a">${f.a}</div>
      </div>`).join(''));
    document.querySelectorAll('.faq-item').forEach(item=>{
      item.querySelector('.faq-q').addEventListener('click',()=>item.classList.toggle('open'));
    });

    /* BUDGET */
    set('budget-tag',t.budget_tag,'text');
    set('budget-h2',t.budget_h2);
    set('budget-body',t.budget_body,'text');
    set('budget-hours',t.budget_hours,'text');

    /* INFO */
    set('info-grid',`
      <div class="info-block"><h3>${t.info_where}</h3><p>${B.address}</p></div>
      <div class="info-block"><h3>${t.info_hours}</h3><p>${t.budget_hours}</p></div>
      <div class="info-block"><h3>${t.info_contact}</h3><ul>
        <li><a href="tel:${B.phone.replace(/\s/g,'')}">${B.phone}</a></li>
        <li><a href="mailto:${B.email}">${B.email}</a></li>
      </ul></div>
      <div class="info-block"><h3>${t.info_follow}</h3><ul>
        <li><a href="${B.social_ig}">Instagram</a></li>
        <li><a href="${B.social_fb}">Facebook</a></li>
      </ul></div>`);

    /* WA TOOLTIP */
    set('whatsapp-tooltip',t.wa_tooltip,'text');
  }

  window.setLang=function(l){ render(l); };

  /* ONE-TIME RENDERS (language-independent) */
  /* HERO PHOTO */
  q('hero-photo').style.backgroundImage=`url('${B.hero_photo}')`;

  /* PROJECTS */
  set('projects-grid',B.projects.map(p=>`
    <div class="project-card">
      <img src="${p.photo}" alt="${p.name}" class="project-photo" loading="lazy">
      <div class="project-overlay"></div>
      <div class="project-info">
        <div class="project-type">${p.type}</div>
        <div class="project-name">${p.name}</div>
        <div class="project-meta">
          <span> ${p.location}</span>
          <span> ${p.m2}</span>
          <span> ${p.duration}</span>
        </div>
      </div>
    </div>`).join(''));

  /* SERVICES */
  set('services-grid',C.services.map(s=>`
    <div class="service-card">
      <span class="service-icon">${s.icon}</span>
      <div class="service-name">${s.name}</div>
      <p class="service-desc">${s.desc}</p>
      <ul class="service-items">
        ${s.items.map(i=>`<li>${i}</li>`).join('')}
      </ul>
    </div>`).join(''));

  /* PROCESS */
  set('process-steps',C.process_steps.map(s=>`
    <div class="process-step">
      <div class="step-num">${s.num}</div>
      <div class="step-content">
        <div class="step-title">${s.title}</div>
        <div class="step-text">${s.text}</div>
      </div>
    </div>`).join(''));

  /* FEATURE PHOTO */
  q('feature-photo').style.backgroundImage=`url('${B.feature_photo}')`;

  /* FEATURE STATS */
  set('feature-stats',C.feature_stats.map(s=>`
    <div class="fs"><span class="fs-num">${s.num}</span><span class="fs-label">${s.label}</span></div>`).join(''));

  /* REVIEWS */
  set('rating-num',B.google_rating,'text');
  const rv=C.reviews.map(rv=>`
    <div class="review-card">
      <div class="review-stars-row">${''.repeat(rv.stars||5)}</div>
      <p class="review-text">"${rv.text}"</p>
      <div class="review-project">${rv.project}</div>
      <div class="review-author">${rv.author} · ${rv.source}</div>
    </div>`).join('');
  set('reviews-track',rv+rv);

  /* BUDGET */
  set('budget-grid',C.budget_items.map(c=>`
    <div class="budget-card">
      <span class="budget-icon">${c.icon}</span>
      <h3>${c.title}</h3><p>${c.text}</p>
      <a href="${c.href}" class="budget-btn">${c.cta}</a>
    </div>`).join(''));

  /* FOOTER */
  set('footer-logo','Mediterras');
  set('footer-copy',`© ${new Date().getFullYear()} Mediterras · La Cala de Mijas · Costa del Sol · Todos los derechos reservados`,'text');
  set('footer-sub',B.tagline,'text');

  /* WHATSAPP */
  const waNum=B.phone.replace(/[\s\-\+\(\)]/g,'');
  const waMsg=encodeURIComponent('Hola, me gustaría solicitar una consulta gratuita para un proyecto de reforma con Mediterras.');
  const waBtn=document.getElementById('whatsapp-btn');
  if(waBtn) waBtn.href=`https://wa.me/34${waNum}?text=${waMsg}`;

  /* NAV SCROLL */
  const nav=q('nav');
  window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>60));

  /* INITIAL RENDER */
  render('es');

  /* FADE IN */
  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)';io.unobserve(e.target);}
    });
  },{threshold:.06});
  setTimeout(()=>{
    document.querySelectorAll('.project-card,.service-card,.process-step,.budget-card,.review-card,.faq-item,.trust-item').forEach(el=>{
      el.style.cssText+='opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease';
      io.observe(el);
    });
  },100);
})();
</script>
